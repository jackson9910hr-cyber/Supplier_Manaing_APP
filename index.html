<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>협력사 공정관리 협의록 앱</title>

  <!-- 캡쳐용 -->
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <style>
    :root{
      --bg:#f6f7fb;
      --card:#ffffff;
      --line:#d6d9e0;
      --text:#1b1f2a;
      --muted:#6b7280;
      --primary:#2563eb;
      --danger:#dc2626;
      --shadow: 0 10px 30px rgba(0,0,0,0.08);
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    header.topbar{
      position:sticky;
      top:0;
      z-index:10;
      background:var(--card);
      border-bottom:1px solid var(--line);
      padding:12px 14px;
    }
    .title-wrap{ display:flex; flex-direction:column; gap:6px; }
    h1.app-title{ margin:0; font-size:20px; font-weight:900; letter-spacing:-0.2px; }
    .save-status{ font-size:12px; color:var(--muted); }

    main{ padding:12px 12px 92px; }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:12px;
      box-shadow:var(--shadow);
      padding:10px;
    }

    .table-scroll{
      overflow:auto;
      border-radius:10px;
      border:1px solid var(--line);
    }

    table{
      width:100%;
      border-collapse:collapse;
      min-width:1200px;
    }
    th, td{
      border-bottom:1px solid var(--line);
      border-right:1px solid var(--line);
      vertical-align:top;
    }
    th:last-child, td:last-child{ border-right:none; }

    thead th{
      position:sticky;
      top:0;
      background:#f2f4f8;
      z-index:2;
      font-size:13px;
      text-align:center;
      padding:10px 8px;
      white-space:nowrap;
    }
    tbody td{ padding:0; background:#fff; }

    textarea.cell{
      width:100%;
      min-height:44px;
      padding:8px;
      border:0;
      outline:none;
      resize:vertical;
      font-size:13px;
      line-height:1.35;
      background:transparent;
      white-space:pre-wrap;
      word-break:break-word;
      overflow-wrap:anywhere;
    }

    /* ✅ 특정 열 가운데 정렬(프로젝트~가능납기) */
    textarea.cell.center{
      text-align:center;
    }

    /* ✅ 가능납기 경고(요구납기보다 늦으면 빨강) */
    textarea.cell.avail-late{
      color: var(--danger);
      font-weight: 800;
    }

    /* col widths */
    col.c-project{ width:140px; }
    col.c-item{ width:160px; }
    col.c-vendor{ width:140px; }
    col.c-date{ width:120px; }
    col.c-status{ width:460px; } /* 제작현황 넓게 */
    col.c-note{ width:220px; }

    .hint{ margin-top:8px; font-size:12px; color:var(--muted); line-height:1.4; }

    /* photos */
    .photos{ margin-top:12px; }
    .photos-head{ display:flex; flex-direction:column; gap:4px; margin-bottom:10px; }
    .photos-title{ font-weight:900; }
    .photos-sub{ font-size:12px; color:var(--muted); }

    .photo-grid{
      display:grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap:10px;
    }
    .photo-card{
      border:1px solid var(--line);
      border-radius:10px;
      overflow:hidden;
      background:#fff;
      position:relative;
    }
    .photo-desc{
      width:100%;
      border:0;
      border-bottom:1px solid var(--line);
      padding:8px;
      font-size:12px;
      outline:none;
    }
    img.photo-img{
      width:100%;
      aspect-ratio:1/1;
      object-fit:cover;
      display:block;
    }

    /* ✅ 사진삭제 모드 표시 */
    .photo-card.delete-mode{
      outline: 3px solid var(--danger);
      outline-offset: -3px;
      cursor:pointer;
    }
    .photo-card.delete-mode::after{
      content: "탭하면 삭제";
      position:absolute;
      top:8px; right:8px;
      background: rgba(220,38,38,0.92);
      color:#fff;
      padding:4px 8px;
      border-radius:999px;
      font-size:11px;
      font-weight:900;
    }

    /* bottom bar */
    footer.bottombar{
      position:fixed;
      left:0; right:0; bottom:0;
      background:var(--card);
      border-top:1px solid var(--line);
      padding:10px;
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      justify-content:center;
      z-index:20;
    }
    button.btn{
      border:1px solid var(--line);
      background:#fff;
      padding:9px 10px;
      border-radius:10px;
      font-size:13px;
      cursor:pointer;
      user-select:none;
      -webkit-tap-highlight-color: transparent;
    }
    button.btn:hover{ filter:brightness(0.98); }
    button.btn:active{ transform:translateY(1px); }
    button.primary{ border-color:var(--primary); color:#fff; background:var(--primary); }
    button.danger{ border-color:var(--danger); color:#fff; background:var(--danger); }
    button.ghost-danger{ border-color:var(--danger); color:var(--danger); background:#fff; }

    /* modal */
    .modal{
      position:fixed;
      inset:0;
      display:none;
      z-index:50;
    }
    .modal.show{ display:block; }
    .backdrop{
      position:absolute;
      inset:0;
      background:rgba(0,0,0,0.45);
    }
    .modal-card{
      position:relative;
      margin:24px auto;
      width:min(1100px, 94vw);
      height:min(82vh, 900px);
      background:#fff;
      border-radius:14px;
      box-shadow:var(--shadow);
      overflow:hidden;
      display:flex;
      flex-direction:column;
    }
    .modal-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:12px 14px;
      border-bottom:1px solid var(--line);
      background:#f7f8fb;
    }
    .modal-title{ font-weight:900; }
    .modal-body{ padding:14px; overflow:auto; }

    .capture-area{ background:#fff; padding:10px; }

    /* ✅ 전체화면: 전 열이 화면에 들어오게 "강제 Fit" */
    .fit-wrap{
      width:100%;
      transform-origin: top left;
    }
    /* 캡쳐 품질을 위해 스케일은 JS에서 계산 적용 */

    .full-title{ font-size:18px; font-weight:900; margin-bottom:6px; }
    .full-meta{ font-size:12px; color:var(--muted); margin-bottom:10px; }

    table.full-table{
      width:100%;
      border-collapse:collapse;
      font-size:12px;
      table-layout: fixed; /* ✅ 열을 화면폭에 맞게 강제 분배 */
    }
    table.full-table th, table.full-table td{
      border:1px solid #cfd3dc;
      padding:6px;
      vertical-align:top;
      white-space:pre-wrap;
      word-break:break-word;
      overflow-wrap:anywhere;
    }

    .full-photos{
      margin-top:12px;
      display:grid;
      grid-template-columns:repeat(4, minmax(0,1fr));
      gap:8px;
    }
    .full-photos img{
      width:100%;
      aspect-ratio:1/1;
      object-fit:cover;
      border:1px solid #cfd3dc;
      border-radius:8px;
    }

    /* dialog */
    .dialog-card{
      position:relative;
      margin:24px auto;
      width:min(520px, 92vw);
      background:#fff;
      border-radius:14px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    .dialog-title{
      padding:12px 14px;
      font-weight:900;
      border-bottom:1px solid var(--line);
      background:#f7f8fb;
    }
    .dialog-body{ padding:14px; font-size:13px; line-height:1.4; }
    .dialog-actions{
      padding:12px 14px;
      display:flex;
      gap:8px;
      justify-content:flex-end;
      border-top:1px solid var(--line);
      background:#fafbff;
      flex-wrap:wrap;
    }
    .small{ font-size:12px; color:var(--muted); }

    @media (max-width: 520px){
      .photo-grid{ grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .full-photos{ grid-template-columns: repeat(2, minmax(0, 1fr)); }
      footer.bottombar{ gap:6px; }
      button.btn{ padding:9px 9px; }
    }
  </style>
</head>

<body>
  <header class="topbar">
    <div class="title-wrap">
      <h1 class="app-title">협력사 공정관리 협의록 앱</h1>
      <div class="save-status" id="saveStatus">not saved_ 저장하세요</div>
    </div>
  </header>

  <main>
    <section class="card">
      <div class="table-scroll">
        <table id="dataTable">
          <colgroup>
            <col class="c-project">
            <col class="c-item">
            <col class="c-vendor">
            <col class="c-date">
            <col class="c-date">
            <col class="c-date">
            <col class="c-date">
            <col class="c-status">
            <col class="c-note">
          </colgroup>
          <thead>
            <tr>
              <th>프로젝트</th>
              <th>품목명</th>
              <th>업체명</th>
              <th data-col="custDue">고객납기</th>
              <th data-col="poDue">PO납기</th>
              <th data-col="reqDue">요구납기</th>
              <th data-col="availDue">가능납기</th>
              <th>제작현황</th>
              <th>비고</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>

      <div class="hint">
        - 프로젝트~가능납기 열은 자동 가운데 정렬<br/>
        - 가능납기 &gt; 요구납기면 가능납기 글자색이 빨간색으로 바뀜<br/>
        - 전체화면은 가로 스크롤 없이 전 열을 한 화면에 맞춰서 표시
      </div>
    </section>

    <section class="card photos">
      <div class="photos-head">
        <div class="photos-title">첨부 사진</div>
        <div class="photos-sub">“사진삭제”를 누르면 삭제모드가 켜지고, 사진을 탭하면 즉시 삭제</div>
      </div>
      <div class="photo-grid" id="photoGrid"></div>
      <input id="photoInput" type="file" accept="image/*" multiple hidden />
    </section>
  </main>

  <!-- 하단 버튼 -->
  <footer class="bottombar">
    <button class="btn" id="btnAddRow">행추가</button>
    <button class="btn" id="btnDelRow">행삭제</button>
    <button class="btn" id="btnFull">전체화면</button>
    <button class="btn" id="btnUser">사용자</button>
    <button class="btn" id="btnShare">공유</button>
    <button class="btn primary" id="btnSave">저장</button>
    <button class="btn" id="btnLoad">불러오기</button>
    <button class="btn" id="btnPhoto">사진추가</button>
    <button class="btn ghost-danger" id="btnPhotoDel">사진삭제</button>
    <button class="btn danger" id="btnMail">메일송부</button>
  </footer>

  <!-- 전체화면 모달 -->
  <div class="modal" id="fullModal" aria-hidden="true">
    <div class="backdrop" id="fullBackdrop"></div>
    <div class="modal-card">
      <div class="modal-head">
        <div class="modal-title">전체화면 보기</div>
        <div>
          <button class="btn" id="btnCloseFull">닫기</button>
        </div>
      </div>
      <div class="modal-body">
        <div class="capture-area" id="captureArea">
          <div class="full-title">협력사 공정관리 협의록</div>
          <div class="full-meta" id="fullMeta"></div>

          <!-- ✅ fit wrapper -->
          <div class="fit-wrap" id="fitWrap">
            <table class="full-table" id="fullTable"></table>
            <div class="full-photos" id="fullPhotos"></div>
          </div>

        </div>
      </div>
    </div>
  </div>

  <!-- 공통 다이얼로그 -->
  <div class="modal" id="dialogModal" aria-hidden="true">
    <div class="backdrop" id="dialogBackdrop"></div>
    <div class="dialog-card">
      <div class="dialog-title" id="dialogTitle">알림</div>
      <div class="dialog-body" id="dialogBody"></div>
      <div class="dialog-actions" id="dialogActions"></div>
    </div>
  </div>

  <script>
    const APP = {
      dueCols: new Set(["custDue","poDue","reqDue"]), // 사용자 선택 납기열
      dirty: true,
      savedFileName: "",
      dirHandle: null,      // 마지막 선택 폴더
      photos: [],            // {desc:"", dataUrl:""}
      photoDeleteMode: false // ✅ 사진삭제 모드
    };

    const COLS = [
      { key: "project", label: "프로젝트", center:true },
      { key: "item", label: "품목명", center:true },
      { key: "vendor", label: "업체명", center:true },
      { key: "custDue", label: "고객납기", type: "due", center:true },
      { key: "poDue", label: "PO납기", type: "due", center:true },
      { key: "reqDue", label: "요구납기", type: "due", center:true },
      { key: "availDue", label: "가능납기", center:true }, // ✅ 경고 판단 대상
      { key: "status", label: "제작현황" },
      { key: "note", label: "비고" },
    ];

    const qs = (id)=>document.getElementById(id);

    function todayPrefix(){
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth()+1).padStart(2,"0");
      const day = String(d.getDate()).padStart(2,"0");
      return `${y}-${m}-${day}_`;
    }

    function normalizeJsonName(inputName){
      const base = (inputName || "").trim();
      if (!base) return todayPrefix(); // 최소 기본값
      // 사용자가 .json을 넣어도 제거하고 마지막에 강제로 붙임
      const noExt = base.replace(/\.json$/i, "");
      return noExt + ".json";
    }

    function setSaveStatus(){
      const el = qs("saveStatus");
      if (!APP.savedFileName){
        el.textContent = "not saved_ 저장하세요";
        return;
      }
      el.textContent = APP.dirty
        ? "not saved_수정사항 발생, 저장하세요"
        : `saved_${APP.savedFileName}`;
    }

    function markDirty(){
      APP.dirty = true;
      setSaveStatus();
    }

    /* ===== 날짜 비교(요구납기 vs 가능납기) ===== */
    function parseDateLoose(s){
      if (!s) return null;
      const t = String(s).trim();
      // YYYY-MM-DD만 확실히 처리
      const m = t.match(/^(\d{4})-(\d{2})-(\d{2})/);
      if (!m) return null;
      const y = Number(m[1]), mo = Number(m[2])-1, d = Number(m[3]);
      const dt = new Date(y, mo, d);
      if (Number.isNaN(dt.getTime())) return null;
      return dt;
    }

    function applyAvailDueColor(tr){
      // COLS index: reqDue=5, availDue=6
      const tas = Array.from(tr.querySelectorAll("td textarea"));
      const req = tas[5]?.value || "";
      const avail = tas[6]?.value || "";
      const reqDt = parseDateLoose(req);
      const availDt = parseDateLoose(avail);

      const availTa = tas[6];
      if (!availTa) return;

      availTa.classList.remove("avail-late");
      if (reqDt && availDt && availDt.getTime() > reqDt.getTime()){
        availTa.classList.add("avail-late");
      }
    }

    function makeCell(val="", colIndex=0){
      const ta = document.createElement("textarea");
      ta.className = "cell";

      // ✅ 가운데 정렬 적용(프로젝트~가능납기)
      const col = COLS[colIndex];
      if (col?.center) ta.classList.add("center");

      ta.value = val;

      ta.addEventListener("input", ()=>{
        markDirty();
        // ✅ 요구납기/가능납기 변경 시 빨강 판단
        const tr = ta.closest("tr");
        if (tr) applyAvailDueColor(tr);
      });

      return ta;
    }

    function addRow(rowData={}){
      const tr = document.createElement("tr");
      COLS.forEach((c, idx)=>{
        const td = document.createElement("td");
        td.appendChild(makeCell(rowData[c.key] ?? "", idx));
        tr.appendChild(td);
      });
      qs("tbody").appendChild(tr);

      // 초기 색상 적용
      applyAvailDueColor(tr);

      markDirty();
    }

    function getRowCount(){
      return qs("tbody").querySelectorAll("tr").length;
    }

    function deleteRowByIndex(idx){
      const rows = Array.from(qs("tbody").querySelectorAll("tr"));
      if (idx<0 || idx>=rows.length) return;
      rows[idx].remove();
      markDirty();
    }

    function getTableData(){
      const rows = Array.from(qs("tbody").querySelectorAll("tr"));
      return rows.map(tr=>{
        const tas = Array.from(tr.querySelectorAll("td textarea"));
        const obj = {};
        COLS.forEach((c,i)=>obj[c.key] = tas[i]?.value ?? "");
        return obj;
      });
    }

    function setTableData(dataRows){
      qs("tbody").innerHTML = "";
      (dataRows || []).forEach(r=>addRow(r));
      if (!dataRows || dataRows.length===0) addRow({});
      markDirty();
    }

    function makeBtn(text, cls, onClick){
      const b = document.createElement("button");
      b.className = `btn ${cls||""}`.trim();
      b.textContent = text;
      b.addEventListener("click", onClick);
      return b;
    }

    function openDialog({title, bodyNode, actions}){
      qs("dialogTitle").textContent = title || "알림";
      const body = qs("dialogBody");
      body.innerHTML = "";
      if (typeof bodyNode === "string") body.innerHTML = bodyNode;
      else body.appendChild(bodyNode);
      const act = qs("dialogActions");
      act.innerHTML = "";
      (actions||[]).forEach(a=>act.appendChild(a));
      qs("dialogModal").classList.add("show");
      qs("dialogModal").setAttribute("aria-hidden","false");
    }

    function closeDialog(){
      qs("dialogModal").classList.remove("show");
      qs("dialogModal").setAttribute("aria-hidden","true");
    }

    function showDeleteRowDialog(){
      const n = getRowCount();
      const wrap = document.createElement("div");
      wrap.innerHTML = `<div>삭제할 행 번호 선택해. <span class="small">(1부터)</span></div>`;

      const sel = document.createElement("select");
      sel.style.width="100%";
      sel.style.marginTop="10px";
      sel.style.padding="10px";
      for (let i=1;i<=n;i++){
        const opt = document.createElement("option");
        opt.value = String(i);
        opt.textContent = `${i}행`;
        sel.appendChild(opt);
      }
      wrap.appendChild(sel);

      openDialog({
        title:"행삭제",
        bodyNode: wrap,
        actions:[
          makeBtn("취소","",closeDialog),
          makeBtn("삭제","danger",()=>{
            deleteRowByIndex(parseInt(sel.value,10)-1);
            closeDialog();
          })
        ]
      });
    }

    function showUserDueDialog(){
      const wrap = document.createElement("div");
      wrap.innerHTML = `<div style="margin-bottom:10px;">전체화면에 표시할 납기열 선택 (중복 선택 가능)</div>`;

      const opts = [
        {key:"custDue", label:"고객납기"},
        {key:"poDue", label:"PO납기"},
        {key:"reqDue", label:"요구납기"},
      ];

      opts.forEach(o=>{
        const line = document.createElement("label");
        line.style.display="flex";
        line.style.alignItems="center";
        line.style.gap="8px";
        line.style.margin="6px 0";

        const cb = document.createElement("input");
        cb.type="checkbox";
        cb.checked = APP.dueCols.has(o.key);
        cb.addEventListener("change", ()=>{
          if (cb.checked) APP.dueCols.add(o.key);
          else APP.dueCols.delete(o.key);
        });

        const span = document.createElement("span");
        span.textContent = o.label;

        line.appendChild(cb);
        line.appendChild(span);
        wrap.appendChild(line);
      });

      openDialog({
        title:"사용자",
        bodyNode: wrap,
        actions:[ makeBtn("닫기","primary",closeDialog) ]
      });
    }

    function buildFullTable(){
      const fullTable = qs("fullTable");
      fullTable.innerHTML = "";

      const visibleCols = COLS.filter(c=>{
        if (c.type === "due") return APP.dueCols.has(c.key);
        return true;
      });

      const thead = document.createElement("thead");
      const trh = document.createElement("tr");
      visibleCols.forEach(c=>{
        const th = document.createElement("th");
        th.textContent = c.label;
        trh.appendChild(th);
      });
      thead.appendChild(trh);

      const tbody = document.createElement("tbody");
      getTableData().forEach(r=>{
        const tr = document.createElement("tr");
        visibleCols.forEach(c=>{
          const td = document.createElement("td");
          td.textContent = r[c.key] ?? "";
          // ✅ 전체화면에서도 가능납기 경고 표시(텍스트 빨강)
          if (c.key === "availDue"){
            const reqDt = parseDateLoose(r["reqDue"]);
            const availDt = parseDateLoose(r["availDue"]);
            if (reqDt && availDt && availDt.getTime() > reqDt.getTime()){
              td.style.color = "var(--danger)";
              td.style.fontWeight = "900";
            }
          }
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });

      fullTable.appendChild(thead);
      fullTable.appendChild(tbody);
    }

    function buildFullPhotos(){
      const wrap = qs("fullPhotos");
      wrap.innerHTML = "";
      APP.photos.forEach(p=>{
        const img = document.createElement("img");
        img.src = p.dataUrl;
        img.alt = p.desc || "첨부사진";
        wrap.appendChild(img);
      });
    }

    function applyFitToScreen(){
      // ✅ fullTable+photos 영역이 가로로 넘치면 scale 다운해서 "전 열이 화면에 보이게"
      const fit = qs("fitWrap");
      const modalBody = document.querySelector("#fullModal .modal-body");
      if (!fit || !modalBody) return;

      // 스케일 초기화 후 실제 폭 측정
      fit.style.transform = "scale(1)";

      const availableW = modalBody.clientWidth - 8; // 여유
      const contentW = fit.scrollWidth;

      if (contentW <= 0) return;

      const scale = Math.min(1, availableW / contentW);
      fit.style.transform = `scale(${scale})`;
    }

    function openFullModal(){
      buildFullTable();
      buildFullPhotos();
      qs("fullMeta").textContent = `생성일시 ${new Date().toLocaleString("ko-KR")}`;
      qs("fullModal").classList.add("show");
      qs("fullModal").setAttribute("aria-hidden","false");

      // 렌더링 후 fit 적용
      requestAnimationFrame(()=>{
        applyFitToScreen();
      });
    }

    function closeFullModal(){
      qs("fullModal").classList.remove("show");
      qs("fullModal").setAttribute("aria-hidden","true");
    }

    async function captureFullPNG(){
      // 캡쳐는 scale(1)로 찍고, 캡쳐 전에 fit을 해제하면 스크롤폭이 커질 수 있음
      // → fit 유지 상태로 캡쳐(“화면에 보이는 그대로”)
      const area = qs("captureArea");
      const canvas = await html2canvas(area, {scale: 2, backgroundColor:"#ffffff"});
      return new Promise(res=>canvas.toBlob(res,"image/png"));
    }

    async function shareOrDownload(blob){
      const fileName = `협의록_${todayPrefix()}capture.png`;
      const file = new File([blob], fileName, {type:"image/png"});

      if (navigator.canShare && navigator.canShare({files:[file]})){
        await navigator.share({files:[file], title:"협의록", text:"전체화면 캡쳐 공유"});
        return;
      }

      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = fileName;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function isMobile(){
      return /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
    }

    function readFileAsDataUrl(file){
      return new Promise((resolve,reject)=>{
        const fr = new FileReader();
        fr.onload = ()=>resolve(fr.result);
        fr.onerror = reject;
        fr.readAsDataURL(file);
      });
    }

    function cropToSquareDataUrl(img){
      const size = Math.min(img.naturalWidth, img.naturalHeight);
      const sx = (img.naturalWidth - size)/2;
      const sy = (img.naturalHeight - size)/2;

      const canvas = document.createElement("canvas");
      canvas.width = 900;
      canvas.height = 900;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, sx, sy, size, size, 0, 0, 900, 900);
      return canvas.toDataURL("image/jpeg", 0.9);
    }

    function toSquare(dataUrl){
      return new Promise(resolve=>{
        const img = new Image();
        img.onload = ()=>resolve(cropToSquareDataUrl(img));
        img.src = dataUrl;
      });
    }

    function renderPhotos(){
      const grid = qs("photoGrid");
      grid.innerHTML = "";

      APP.photos.forEach((p, idx)=>{
        const card = document.createElement("div");
        card.className = "photo-card";

        // ✅ 삭제모드면 강조
        if (APP.photoDeleteMode) card.classList.add("delete-mode");

        const desc = document.createElement("input");
        desc.className = "photo-desc";
        desc.placeholder = "사진 설명 입력";
        desc.value = p.desc || "";
        desc.addEventListener("input", ()=>{
          p.desc = desc.value;
          markDirty();
        });

        const img = document.createElement("img");
        img.className = "photo-img";
        img.src = p.dataUrl;

        card.appendChild(desc);
        card.appendChild(img);

        // ✅ 삭제모드: 탭 즉시 삭제(팝업 없음)
        card.addEventListener("click", (e)=>{
          if (!APP.photoDeleteMode) return;
          // 입력 중이면 무시
          if (e.target && (e.target.tagName === "INPUT")) return;

          APP.photos.splice(idx, 1);
          renderPhotos();
          markDirty();
        });

        grid.appendChild(card);
      });
    }

    async function handlePhotoFiles(fileList){
      const files = Array.from(fileList || []);
      if (files.length === 0) return;

      for (const f of files){
        const dataUrl = await readFileAsDataUrl(f);
        const sq = await toSquare(dataUrl);
        APP.photos.push({desc:"", dataUrl: sq});
      }
      renderPhotos();
      markDirty();
    }

    function makePayload(){
      return {
        version: 1,
        savedAt: new Date().toISOString(),
        savedFileName: APP.savedFileName || "",
        dueCols: Array.from(APP.dueCols),
        rows: getTableData(),
        photos: APP.photos
      };
    }

    function loadPayload(payload){
      if (!payload) return;
      APP.dueCols = new Set(payload.dueCols || ["custDue","poDue","reqDue"]);
      APP.photos = payload.photos || [];
      APP.photoDeleteMode = false;
      renderPhotos();
      setTableData(payload.rows || []);
      APP.savedFileName = payload.savedFileName || APP.savedFileName || "";
      APP.dirty = false;
      setSaveStatus();
    }

    function downloadJson(name, obj){
      const blob = new Blob([JSON.stringify(obj, null, 2)], {type:"application/json"});
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = name;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    async function pickFolderAlways(){
      // ✅ 저장 시 경로 선택 가능(폴더 저장 지원 브라우저)
      if (!window.showDirectoryPicker) return null;
      return await window.showDirectoryPicker({mode:"readwrite"});
    }

    async function save(){
      const suggestedBase = todayPrefix();  // ✅ 오늘날짜+"_" 만
      const currentBase = (APP.savedFileName || "").replace(/\.json$/i,"");
      const defaultBase = currentBase || suggestedBase;

      // ✅ 사용자 입력은 확장자 없이 받게 유도(고정)
      const inputBase = prompt("저장 파일명 입력 (확장자 json 고정)", defaultBase) || defaultBase;
      const fileName = normalizeJsonName(inputBase); // ✅ 강제 .json

      // ✅ 경로 선택 옵션 제공(지원 브라우저)
      if (window.showDirectoryPicker){
        const wrap = document.createElement("div");
        wrap.innerHTML = `
          <div style="margin-bottom:10px;">저장 경로를 선택할 수 있어.</div>
          <div class="small">- "현재 경로 저장"은 이전에 선택한 폴더에 저장</div>
          <div class="small">- "경로 변경"은 새 폴더를 선택</div>
        `;

        openDialog({
          title:"저장",
          bodyNode: wrap,
          actions:[
            makeBtn("취소","", closeDialog),
            makeBtn("현재 경로 저장","primary", async ()=>{
              closeDialog();
              try{
                if (!APP.dirHandle) APP.dirHandle = await pickFolderAlways();
                const fileHandle = await APP.dirHandle.getFileHandle(fileName, {create:true});
                const writable = await fileHandle.createWritable();
                APP.savedFileName = fileName;
                await writable.write(JSON.stringify(makePayload(), null, 2));
                await writable.close();
                APP.dirty = false;
                setSaveStatus();
              } catch(e){}
            }),
            makeBtn("경로 변경","", async ()=>{
              closeDialog();
              try{
                APP.dirHandle = await pickFolderAlways();
                const fileHandle = await APP.dirHandle.getFileHandle(fileName, {create:true});
                const writable = await fileHandle.createWritable();
                APP.savedFileName = fileName;
                await writable.write(JSON.stringify(makePayload(), null, 2));
                await writable.close();
                APP.dirty = false;
                setSaveStatus();
              } catch(e){}
            }),
          ]
        });
        return;
      }

      // ✅ iPad Safari: 다운로드(경로는 OS가 처리)
      APP.savedFileName = fileName;
      downloadJson(fileName, makePayload());
      APP.dirty = false;
      setSaveStatus();
    }

    async function load(){
      // 데스크탑: 폴더에서 json 리스트 보여주기
      if (window.showDirectoryPicker){
        const dir = await window.showDirectoryPicker({mode:"readwrite"});
        APP.dirHandle = dir;

        const files = [];
        for await (const [name, handle] of dir.entries()){
          if (handle.kind === "file" && name.toLowerCase().endsWith(".json")){
            files.push({name, handle});
          }
        }
        files.sort((a,b)=>a.name.localeCompare(b.name));

        if (files.length === 0){
          openDialog({
            title:"불러오기",
            bodyNode:`<div>선택한 폴더에 JSON 파일이 없어.</div>`,
            actions:[ makeBtn("확인","primary",closeDialog) ]
          });
          return;
        }

        const wrap = document.createElement("div");
        wrap.innerHTML = `<div style="margin-bottom:8px;">불러올 파일 선택해.</div>`;
        const sel = document.createElement("select");
        sel.style.width="100%";
        sel.style.padding="10px";
        files.forEach(f=>{
          const opt = document.createElement("option");
          opt.value = f.name;
          opt.textContent = f.name;
          sel.appendChild(opt);
        });
        wrap.appendChild(sel);

        openDialog({
          title:"불러오기",
          bodyNode: wrap,
          actions:[
            makeBtn("취소","",closeDialog),
            makeBtn("불러오기","primary", async ()=>{
              const name = sel.value;
              const f = files.find(x=>x.name===name);
              const file = await f.handle.getFile();
              const text = await file.text();
              const payload = JSON.parse(text);
              payload.savedFileName = name;
              loadPayload(payload);
              closeDialog();
            })
          ]
        });
        return;
      }

      // iPad: 파일 선택 업로드
      const input = document.createElement("input");
      input.type="file";
      input.accept="application/json";
      input.onchange = async ()=>{
        const f = input.files?.[0];
        if (!f) return;
        const text = await f.text();
        const payload = JSON.parse(text);
        payload.savedFileName = f.name;
        loadPayload(payload);
      };
      input.click();
    }

    async function shareCapture(){
      if (!qs("fullModal").classList.contains("show")) openFullModal();
      const blob = await captureFullPNG();
      await shareOrDownload(blob);
    }

    async function sendMail(){
      await shareCapture();

      const to = "dokil.lee@doosan.com";
      const subject = encodeURIComponent(`협력사 공정관리 협의록 (${todayPrefix().slice(0,10)})`);
      const body = encodeURIComponent(
        `전체화면 캡쳐(PNG)는 방금 생성(공유/저장)했어.\n` +
        `첨부 자동 발송은 Email 서비스(EmailJS/서버리스)가 추가로 필요해.\n\n` +
        `저장파일명 ${APP.savedFileName || "(미저장)"}\n` +
        `행 수 ${getRowCount()}\n`
      );
      window.location.href = `mailto:${to}?subject=${subject}&body=${body}`;
    }

    function togglePhotoDeleteMode(){
      APP.photoDeleteMode = !APP.photoDeleteMode;
      const btn = qs("btnPhotoDel");
      btn.textContent = APP.photoDeleteMode ? "사진삭제(ON)" : "사진삭제";
      btn.classList.toggle("danger", APP.photoDeleteMode);
      btn.classList.toggle("ghost-danger", !APP.photoDeleteMode);
      renderPhotos();
    }

    function init(){
      // 기본 입력행 1개
      addRow({});

      // 버튼
      qs("btnAddRow").addEventListener("click", ()=>addRow({}));
      qs("btnDelRow").addEventListener("click", showDeleteRowDialog);
      qs("btnUser").addEventListener("click", showUserDueDialog);
      qs("btnFull").addEventListener("click", openFullModal);
      qs("btnShare").addEventListener("click", shareCapture);
      qs("btnSave").addEventListener("click", save);
      qs("btnLoad").addEventListener("click", load);

      // 사진
      qs("btnPhoto").addEventListener("click", ()=>{
        if (!isMobile()){
          openDialog({
            title:"사진추가",
            bodyNode:`<div>사진추가는 모바일(iPad/iPhone)에서 쓰는 걸 추천해. 데스크탑도 가능은 해.</div>`,
            actions:[ makeBtn("확인","primary",closeDialog) ]
          });
        }
        qs("photoInput").click();
      });
      qs("photoInput").addEventListener("change", (e)=>{
        handlePhotoFiles(e.target.files);
        e.target.value = "";
      });

      // ✅ 사진삭제
      qs("btnPhotoDel").addEventListener("click", togglePhotoDeleteMode);

      // ✅ 메일송부(사진삭제 오른쪽)
      qs("btnMail").addEventListener("click", sendMail);

      // 모달 닫기
      qs("btnCloseFull").addEventListener("click", closeFullModal);
      qs("fullBackdrop").addEventListener("click", closeFullModal);
      qs("dialogBackdrop").addEventListener("click", closeDialog);

      // 전체화면 리사이즈 시 fit 재계산
      window.addEventListener("resize", ()=>{
        if (qs("fullModal").classList.contains("show")) applyFitToScreen();
      });

      // 초기 상태
      APP.dirty = true;
      setSaveStatus();
    }

    document.addEventListener("DOMContentLoaded", init);
  </script>
</body>
</html>
